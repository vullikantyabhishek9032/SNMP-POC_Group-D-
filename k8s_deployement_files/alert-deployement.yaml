apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-read-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-read
  template:
    metadata:
      labels:
        app: alert-read
    spec:
      containers:
        - name: alert-read-container
          image: alert-read-service:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8089