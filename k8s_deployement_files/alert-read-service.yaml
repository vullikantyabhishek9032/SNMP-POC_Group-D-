apiVersion: v1
kind: Service
metadata:
  name: alert-read
spec:
  type: NodePort
  selector:
    app: alert-read
  ports:
    - name: http
      protocol: TCP
      port: 8089        # Service port (inside cluster)
      targetPort: 8089  # Container port
      nodePort: 30089   # External access port (range: 30000–32767)
