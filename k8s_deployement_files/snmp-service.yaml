apiVersion: v1
kind: Service
metadata:
  name: snmp-microservice-service
  labels:
    app: snmp-microservice
spec:
  type: NodePort
  selector:
    app: snmp-microservice
  ports:
    - name: http
      protocol: TCP
      port: 8080        # Service port
      targetPort: 8080  # Container port
      nodePort: 30082   # External access port

    - name: snmp
      protocol: UDP
      port: 161
      targetPort: 161
