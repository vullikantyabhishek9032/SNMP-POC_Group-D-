spring.application.name=SNMPTrapMicroservice
server.port:8081
# Spring JPA & MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/snmp_trap_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# SNMP Trap Receiver Configuration
snmp.target.host=127.0.0.1
snmp.trap.port=162
snmp.trap.community=public
snmp.trap.enabled=true

# Simulator Configuration (for testing)
simulator.enabled=false
simulator.trap.interval=5000

# Logging
logging.level.com.example.snmptrapmicroservice=DEBUG
logging.level.org.snmp4j=WARN
logging.level.org.hibernate.SQL=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always